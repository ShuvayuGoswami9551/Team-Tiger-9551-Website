<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tools Login – Team Tiger 9551</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="../assets/logo-team-tiger.png" alt="Team Tiger 9551 logo" class="team-logo" />
      <div class="brand-text">
        <span class="team-number">Team Tiger 9551</span>
        <span class="team-name">Team Tiger</span>
      </div>
    </div>
    <nav class="main-nav">
      <a href="../index.html">Home</a>
      <a href="../team/about.html">Team</a>
      <a href="../team/robots.html">Robots</a>
      <a href="../team/sponsors.html">Sponsors</a>
      <a href="../team/media.html">Media</a>
      <a href="../team/contact.html">Contact</a>
      <a href="index.html">Tools</a>
    </nav>
  </header>

  <main class="login-page">
    <section class="login-card">
      <h1>Team tools access</h1>
      <p>Team Tiger 9551 members can unlock scouting and inventory tools with the shared team password.</p>

      <div class="login-form-group">
        <label for="tools-password">Team tools password</label>
        <input
          type="password"
          id="tools-password"
          class="login-input"
          placeholder="Enter password"
        />
      </div>

      <div class="login-actions">
        <button class="btn small" onclick="toolsLogin()">Unlock tools</button>
        <span class="login-meta">Shared privately within Team Tiger.</span>
      </div>

      <p id="tools-error" class="muted" style="margin-top:8px;"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 20XX Team Tiger 9551</p>
  </footer>

  <script>
    const TEAM_TOOLS_PASSWORD = "StemHarvest"; // change to your real password

    function toolsLogin() {
      const input = document.getElementById('tools-password').value;
      const error = document.getElementById('tools-error');
      if (input === TEAM_TOOLS_PASSWORD) {
        localStorage.setItem('teamTigerToolsAccess', 'true');
        error.textContent = "";
        window.location.href = "index.html";
      } else {
        error.textContent = "Incorrect password.";
      }
    }
  </script>
</body>
</html>
