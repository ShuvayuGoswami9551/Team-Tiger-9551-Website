<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tools Login – Team Tiger 9551</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="../assets/logo-team-tiger.png" alt="Team Tiger 9551 logo" class="team-logo" />
      <div class="brand-text">
        <span class="team-number">Team Tiger 9551</span>
        <span class="team-name">Team Tiger</span>
      </div>
    </div>
    <nav class="main-nav">
      <a href="../index.html">Home</a>
      <a href="../team/about.html">Team</a>
      <a href="../team/robots.html">Robots</a>
      <a href="../team/sponsors.html">Sponsors</a>
      <a href="../team/media.html">Media</a>
      <a href="../team/contact.html">Contact</a>
      <a href="login.html" class="active">Tools</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Team tools login</h1>
      <p>Team Tiger members can log in here to access scouting and inventory tools.</p>
    </section>

    <section class="card">
      <h2>Enter team password</h2>
      <p>This password is shared privately with Team Tiger 9551 members.</p>
      <input type="password" id="tools-password" placeholder="Team tools password" />
      <button class="btn small" onclick="toolsLogin()">Unlock tools</button>
      <p id="tools-error" class="muted"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 20XX Team Tiger 9551</p>
  </footer>

  <script>
    const TEAM_TOOLS_PASSWORD = "StemHarvest"; // change this to your real password

    function toolsLogin() {
      const input = document.getElementById('tools-password').value;
      const error = document.getElementById('tools-error');
      if (input === TEAM_TOOLS_PASSWORD) {
        // mark this browser as logged in
        localStorage.setItem('teamTigerToolsAccess', 'true');
        error.textContent = "";
        // send them to tools home or scouting app
        window.location.href = "scouting/index.html";
      } else {
        error.textContent = "Incorrect password.";
      }
    }
  </script>
</body>
</html>
