<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Inventory – Team Tiger 9551</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../../assets/logo-team-tiger.png" alt="Team Tiger 9551 logo" class="team-logo" />
      </div>
      <div class="brand-text">
        <span class="team-number">Team Tiger 9551</span>
      </div>
    </div>
    <nav class="main-nav">
      <a href="../../index.html">Home</a>
      <a href="../../team/about.html">Team</a>
      <a href="../../team/robots.html">Robots</a>
      <a href="../../team/sponsors.html">Sponsors</a>
      <a href="../../team/media.html">Media</a>
      <a href="../../team/contact.html">Contact</a>
      <a href="../index.html">Tools</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Inventory – Team Tiger 9551</h1>
      <p>Browse all parts and materials currently tracked in Team Tiger’s inventory.</p>
    </section>

    <section style="margin-bottom: 12px; display:flex; flex-wrap:wrap; gap:8px; justify-content:space-between; align-items:center;">
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn small secondary" onclick="logoutTools()">Log out</button>
        <a class="btn small" href="submit.html">Submit new item</a>
      </div>
      <div style="display:flex; gap:6px; align-items:center;">
        <label for="inventory-search" class="login-meta" style="margin:0;">Search</label>
        <input id="inventory-search" type="text" class="login-input" style="max-width:220px;" placeholder="Search by name or category" />
      </div>
    </section>

    <section class="card">
      <div class="table-wrapper">
        <table id="inventory-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Item name</th>
              <th>Category</th>
              <th>Part # / SKU</th>
              <th>Quantity</th>
              <th>Location</th>
              <th>Minimum stock</th>
              <th>Supplier</th>
            </tr>
          </thead>
          <tbody id="inventory-body">
          </tbody>
        </table>
      </div>
      <p id="inventory-status" class="muted" style="margin-top:8px;"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2024 Team Tiger 9551</p>
  </footer>

  <script>
    // Require tools login
    if (localStorage.getItem('teamTigerToolsAccess') !== 'true') {
      window.location.href = '../login.html';
    }

    function logoutTools() {
      localStorage.removeItem('teamTigerToolsAccess');
      window.location.href = '../../index.html';
    }

    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyAMKHVJVmn-qHwaKnKLR3gpc1nfcg--u1TNIzw6qvJGtqWMT71M4YB0CZeDFtTSbY2gg/exec'; // same URL as submit.html

    let inventoryItems = [];

    async function loadInventory() {
      const statusEl = document.getElementById('inventory-status');
      const bodyEl = document.getElementById('inventory-body');
      statusEl.textContent = 'Loading inventory...';

      try {
        const res = await fetch(BACKEND_URL + '?mode=list');
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        const data = await res.json();
        inventoryItems = data.items || [];

        if (!inventoryItems.length) {
          statusEl.textContent = 'No inventory items found yet.';
          bodyEl.innerHTML = '';
          return;
        }

        renderInventoryTable(inventoryItems);
        statusEl.textContent = `Loaded ${inventoryItems.length} items.`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading inventory: ' + err.message;
      }
    }

    function renderInventoryTable(items) {
      const bodyEl = document.getElementById('inventory-body');
      const rows = items.map(item => {
        const imgUrl = item['Image URL'] || '';
        const imgHtml = imgUrl
          ? `<img src="${imgUrl}" alt="${item['Item name'] || 'Part image'}" class="inventory-image" />`
          : '';

        const qty = Number(item['Quantity on hand'] || 0);
        const min = Number(item['Minimum stock'] || 0);
        const low = min > 0 && qty <= min;

        const qtyClass = low ? 'inventory-qty-low' : 'inventory-qty-ok';

        return `
          <tr>
            <td>${imgHtml}</td>
            <td><strong>${item['Item name'] || ''}</strong></td>
            <td>${item['Category'] || ''}</td>
            <td>${item['Part number / SKU'] || ''}</td>
            <td class="${qtyClass}">${qty}</td>
            <td>${item['Location'] || ''}</td>
            <td>${item['Minimum stock'] || ''}</td>
            <td>${item['Supplier'] || ''}</td>
          </tr>
        `;
      }).join('');

      bodyEl.innerHTML = rows;
    }

    function setupSearch() {
      const input = document.getElementById('inventory-search');
      input.addEventListener('input', () => {
        const term = input.value.trim().toLowerCase();
        if (!term) {
          renderInventoryTable(inventoryItems);
          return;
        }

        const filtered = inventoryItems.filter(item => {
          const name = String(item['Item name'] || '').toLowerCase();
          const category = String(item['Category'] || '').toLowerCase();
          return name.includes(term) || category.includes(term);
        });

        renderInventoryTable(filtered);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadInventory();
      setupSearch();
    });
  </script>
</body>
</html>
