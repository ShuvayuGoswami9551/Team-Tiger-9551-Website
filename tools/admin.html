<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Admin – Team Tiger 9551</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../assets/logo-team-tiger.png" alt="Team Tiger 9551 logo" class="team-logo" />
      </div>
      <div class="brand-text">
        <span class="team-number">Team Tiger 9551</span>
      </div>
    </div>
    <nav class="main-nav">
      <a href="../index.html">Home</a>
      <a href="../team/about.html">Team</a>
      <a href="../team/robots.html">Robots</a>
      <a href="../team/sponsors.html">Sponsors</a>
      <a href="../team/media.html">Media</a>
      <a href="../team/contact.html">Contact</a>
      <a href="index.html">Tools</a>
    </nav>
    <nav class="tools-nav">
      <div class="tools-nav-left">
        <span class="tools-nav-title">Team Tiger Tools</span>
      </div>
      <div class="tools-nav-links">
        <a href="../index.html" class="tools-nav-link">Tools home</a>
        <a href="../scouting/index.html" class="tools-nav-link">Scouting</a>
        <a href="../scouting/view.html" class="tools-nav-link">View scouting</a>
        <a href="../inventory/index.html" class="tools-nav-link">Inventory</a>
        <a href="../admin.html" class="tools-nav-link">Admin</a>
      </div>
    </nav>
  </header>

  <main class="login-page">
    <section class="login-card">
      <h1>Admin settings</h1>
      <p>Configure event settings used by the scouting tools.</p>

      <div class="login-form-group">
        <label for="event-name-admin">Current event name</label>
        <input
          id="event-name-admin"
          type="text"
          class="login-input"
          placeholder="e.g., 2026 XYZ Regional"
        />
      </div>

      <div class="login-actions">
        <button class="btn small" onclick="saveCurrentEvent()">Save event</button>
        <span class="login-meta">This event name will appear on the scouting form.</span>
      </div>

      <p id="event-save-status" class="muted" style="margin-top:8px;"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2024 Team Tiger 9551</p>
  </footer>

  <script>
    if (localStorage.getItem('teamTigerToolsAccess') !== 'true') {
      window.location.href = 'login.html';
    }

    const SCOUTING_BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxYnmfC-xiQTH85baKS5M_l9QjpgJcOsfQHJwHvY0qkt-eP7SoaiZSwpDFSkh2-FL02/exec';

    async function saveCurrentEvent() {
    const input = document.getElementById('event-name-admin');
    const status = document.getElementById('event-save-status');
    const value = input.value.trim();

    if (!value) {
        status.textContent = 'Please enter an event name.';
        return;
    }

    try {
        const params = new URLSearchParams({
        mode: 'setEvent',
        eventKey: value
        });
          const res = await fetch(SCOUTING_BACKEND_URL + '?' + params.toString());
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
          const json = await res.json();
        if (json.success) {
          status.textContent = 'Event key saved: ' + json.eventKey;
        } else {
          status.textContent = 'Error: ' + (json.error || 'Unknown error');
        }
    } catch (err) {
        console.error(err);
        status.textContent = 'Error saving event key: ' + err.message;
      }
      }

      document.addEventListener('DOMContentLoaded', async () => {
      const input = document.getElementById('event-name-admin');
      const status = document.getElementById('event-save-status');

      try {
        const res = await fetch(SCOUTING_BACKEND_URL + '?mode=getEvent');
        if (!res.ok) {
        throw new Error('HTTP ' + res.status);
        }
        const json = await res.json();
        input.value = json.eventKey || '';
        if (json.eventKey) {
        status.textContent = 'Current event key: ' + json.eventKey;
        }
      } catch (err) {
        console.error(err);
        status.textContent = 'Error loading current event key.';
      }
    });
  </script>
</body>
</html>
