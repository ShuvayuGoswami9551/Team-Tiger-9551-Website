<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Admin – Team Tiger 9551</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../assets/logo-team-tiger.png" alt="Team Tiger 9551 logo" class="team-logo" />
      </div>
      <div class="brand-text">
        <span class="team-number">Team Tiger 9551</span>
      </div>
    </div>
    <nav class="main-nav">
      <a href="../index.html">Home</a>
      <a href="../team/about.html">Team</a>
      <a href="../team/robots.html">Robots</a>
      <a href="../team/sponsors.html">Sponsors</a>
      <a href="../team/media.html">Media</a>
      <a href="../team/contact.html">Contact</a>
      <a href="index.html">Tools</a>
    </nav>
    <nav class="tools-nav">
      <div class="tools-nav-left">
        <span class="tools-nav-title">Team Tiger Tools</span>
      </div>
      <div class="tools-nav-links">
        <a href="../index.html" class="tools-nav-link">Tools home</a>
        <a href="../scouting/index.html" class="tools-nav-link">Scouting</a>
        <a href="../scouting/view.html" class="tools-nav-link">View scouting</a>
        <a href="../inventory/index.html" class="tools-nav-link">Inventory</a>
        <a href="../admin.html" class="tools-nav-link">Admin</a>
      </div>
    </nav>
  </header>

  <main class="login-page">
    <section class="login-card">
      <article class="card">
        <h2>Event settings</h2>

        <div class="login-form-group">
          <label for="event-key">Internal event key (for scouting)</label>
          <input
            id="event-key"
            type="text"
            class="login-input"
            placeholder="e.g., 2026-teamtiger-event"
          />
        </div>

        <div class="login-form-group">
          <label for="tba-event-key">TBA event key</label>
          <input
            id="tba-event-key"
            type="text"
            class="login-input"
            placeholder="e.g., 2026txhou"
          />
        </div>

        <div class="login-actions">
          <button class="btn small" onclick="saveEventSettings()">Save settings</button>
          <span class="login-meta" id="event-settings-status"></span>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2024 Team Tiger 9551</p>
  </footer>

  <script>
    // Require tools login
    if (localStorage.getItem('teamTigerToolsAccess') !== 'true') {
      window.location.href = 'login.html';
    }

    const SCOUTING_BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwYTcI2EBI243ldjIbZV2UBJFtSj3R4KvAu54Sror8_C34mcptRbaSrx2JN-G3SJuTZyg/exec';

    async function saveEventSettings() {
      const internalInput = document.getElementById('event-key');
      const tbaInput = document.getElementById('tba-event-key');
      const status = document.getElementById('event-settings-status');

      const internalKey = internalInput.value.trim();
      const tbaKey = tbaInput.value.trim();

      if (!internalKey && !tbaKey) {
        status.textContent = 'Please enter at least one key to save.';
        return;
      }

      status.textContent = 'Saving settings…';

      try {
        const params = new URLSearchParams({
          mode: 'setEvent',
          eventKey: internalKey,
          tbaEventKey: tbaKey
        });

        const res = await fetch(SCOUTING_BACKEND_URL + '?' + params.toString());
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        const json = await res.json();

        if (json.success) {
          status.textContent = 'Event settings saved.';
        } else {
          status.textContent = 'Error: ' + (json.error || 'Unknown error');
        }
      } catch (err) {
        console.error('Save event settings error:', err);
        status.textContent = 'Error saving settings: ' + err.message;
      }
    }

    // Load current internal + TBA event keys
    document.addEventListener('DOMContentLoaded', async () => {
      const internalInput = document.getElementById('event-key');
      const tbaInput = document.getElementById('tba-event-key');
      const status = document.getElementById('event-settings-status');

      try {
        // getSettings should return both A2 (internal) and B2 (TBA)
        const res = await fetch(SCOUTING_BACKEND_URL + '?mode=getSettings');
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        const json = await res.json();

        internalInput.value = json.eventKey || '';
        tbaInput.value = json.tbaEventKey || '';

        if (json.eventKey || json.tbaEventKey) {
          status.textContent =
            'Current internal: ' + (json.eventKey || '(none)') +
            ' | TBA: ' + (json.tbaEventKey || '(none)');
        }
      } catch (err) {
        console.error('Error loading event settings:', err);
        status.textContent = 'Error loading event settings.';
      }
    });
  </script>
</body>
</html>
